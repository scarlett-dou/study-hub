<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Study Hub</title>
<!-- PWA:清单 + iOS 主屏幕支持 -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Study Hub">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<style>
  :root{
    --bg:#f2f2f7; --bg2:#ffffff; --card:#ffffff;
    --text:#1c1c1e; --text2:rgba(60,60,67,.6); --text3:rgba(60,60,67,.3);
    --sep:rgba(60,60,67,.16); --sep2:rgba(60,60,67,.29);
    --tint:#007aff; --tint-soft:#e9f0ff;
    --red:#ff3b30; --green:#34c759; --orange:#ff9500; --gray:#8e8e93;
    --fill:rgba(120,120,128,.12); --fill2:rgba(120,120,128,.2);
    --r:12px; --r-sm:9px; --r-lg:16px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 1px rgba(0,0,0,.03);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#000000; --bg2:#1c1c1e; --card:#1c1c1e; --text:#ffffff; --text2:rgba(235,235,245,.6); --text3:rgba(235,235,245,.3);
      --sep:rgba(84,84,88,.5); --sep2:rgba(84,84,88,.65); --tint:#0a84ff; --tint-soft:#0a2647;
      --red:#ff453a; --green:#30d158; --orange:#ff9f0a; --gray:#98989d; --fill:rgba(120,120,128,.24); --fill2:rgba(120,120,128,.36);
      --shadow:0 1px 3px rgba(0,0,0,.4); }
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue","Microsoft YaHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;color:var(--text);background:var(--bg);padding:22px 16px 60px;min-height:100vh;font-size:15px;line-height:1.45}
  .wrap{max-width:1040px;margin:0 auto}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3,h4{font-weight:600;margin:0}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .brand{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .nav{display:flex;gap:6px;background:var(--fill);padding:3px;border-radius:11px}
  .nav button{border:none;background:transparent;border-radius:8px;padding:7px 15px;font-size:14px;font-weight:500;color:var(--text);transition:.18s}
  .nav button.sel{background:var(--bg2);box-shadow:var(--shadow);font-weight:600}

  .countdown{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .countdown .big{font-size:clamp(40px,8vw,60px);font-weight:700;letter-spacing:-.03em;line-height:.95;color:var(--tint);font-variant-numeric:tabular-nums}
  .countdown .big small{font-size:15px;font-weight:500;color:var(--text2);margin-left:7px}
  .countdown .meta{flex:1;min-width:200px}
  .countdown .meta .lab{font-size:13px;color:var(--text2)}
  .countdown .meta .ttl{font-size:18px;font-weight:600;margin:1px 0 9px}
  .pbar{height:8px;border-radius:5px;background:var(--fill2);overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--tint);border-radius:5px}
  .countdown .meta .pn{font-size:12px;color:var(--text2);margin-top:5px}
  .countdown.nodate .big{display:none}

  .cal{display:grid;grid-template-columns:1.25fr 1fr;gap:16px;align-items:start}
  .calleft{display:flex;flex-direction:column;gap:16px;min-width:0}
  @media(max-width:780px){.cal{grid-template-columns:1fr}}
  .panel{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:16px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-head .mo{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .cal-head .navb{display:flex;gap:4px}
  .cal-head button{border:none;background:var(--fill);color:var(--tint);width:30px;height:30px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center}
  .cal-head button:hover{background:var(--fill2)}
  .cal-head .today-btn{width:auto;padding:0 12px;font-size:13px;font-weight:600}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-wd{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:2px 0 6px}
  .cal-wd.we{color:var(--text3)}
  .cell{position:relative;min-height:52px;border-radius:9px;padding:5px 2px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.12s;border:1px solid transparent}
  .cell.fill{cursor:pointer}
  .cell.fill:hover{background:var(--fill)}
  .cell.sel{background:var(--tint-soft)}
  .cell .dn{font-size:15px;font-weight:500;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;line-height:1}
  .cell.today .dn{background:var(--red);color:#fff;font-weight:600}
  .cell.sel:not(.today) .dn{color:var(--tint);font-weight:700}
  .cell.past .dn{color:var(--text3)}
  .cell.today.past .dn{color:#fff}
  .dots{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;align-items:center;max-width:100%}
  .dots i{width:6px;height:6px;border-radius:50%;display:block}
  .dots i.ring{background:transparent!important;box-shadow:inset 0 0 0 1.5px currentColor}
  .dots .mk{width:6px;height:6px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .dots .mk svg{width:6px;height:6px;display:block}
  .dots .nmore{font-size:9px;color:var(--text2);line-height:6px}
  .dots .mk.rv{opacity:.45;border-radius:2px}
  .cell .alldone{position:absolute;top:2px;right:3px;color:var(--green);font-size:10px;font-weight:800;line-height:1}
  .cell.today .alldone{color:#fff}
  .dp-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .dp-head .d{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .dp-head .wd{font-size:13px;color:var(--text2)}
  .lock{display:flex;align-items:center;gap:10px;background:var(--fill);border-radius:10px;padding:9px 12px;margin:10px 0;font-size:12.5px;color:var(--text2)}
  .lock button{border:none;background:var(--bg2);color:var(--tint);border-radius:7px;padding:5px 11px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow)}
  .seclab{font-size:12px;font-weight:600;color:var(--text2);text-transform:none;margin:16px 0 7px}
  .glist{background:var(--card);border:1px solid var(--sep);border-radius:11px;overflow:hidden}
  .gi{display:flex;align-items:center;gap:11px;padding:11px 13px;border-top:1px solid var(--sep)}
  .gi:first-child{border-top:none}
  .gdot{width:11px;height:11px;border-radius:50%;flex:none}
  .gi .gt{flex:1;font-size:14.5px;min-width:0}
  .gi .gt .gs{font-size:11.5px;color:var(--text2);margin-top:2px}
  .gi.done .gt .gtitle{color:var(--text2);text-decoration:line-through}
  .gck{width:24px;height:24px;border-radius:50%;border:1.8px solid var(--fill2);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;background:transparent}
  .gck.on{background:var(--green);border-color:var(--green)}
  .gacts{display:flex;gap:3px;flex:none}
  .gacts button{border:none;background:none;color:var(--text3);font-size:15px;padding:2px 4px}
  .gacts button:hover{color:var(--tint)}
  .rate{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .rb{border:1px solid var(--sep2);background:transparent;border-radius:8px;padding:5px 12px;font-size:12.5px;font-weight:500;color:var(--text)}
  .rb:active{transform:scale(.97)}
  .rb-again{color:var(--red)} .rb-again:hover{background:var(--red);color:#fff;border-color:var(--red)}
  .rb-hard{color:var(--orange)} .rb-hard:hover{background:var(--orange);color:#fff;border-color:var(--orange)}
  .rb-good{color:var(--tint)} .rb-good:hover{background:var(--tint);color:#fff;border-color:var(--tint)}
  .rb-easy{color:var(--green)} .rb-easy:hover{background:var(--green);color:#fff;border-color:var(--green)}
  .rb-skip{color:var(--text2);margin-left:auto}
  .rb.sel{background:var(--tint);color:#fff;border-color:var(--tint)}
  .mbar{height:5px;border-radius:3px;background:var(--fill2);overflow:hidden;margin-top:7px;max-width:200px}
  .mbar i{display:block;height:100%;border-radius:3px}
  .empty{font-size:13px;color:var(--text2);padding:8px 2px}
  .addrow{display:flex;gap:8px;margin-top:9px}
  .addrow input{flex:1}

  .mod-h{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:2px 0 4px}
  .mod-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}
  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .card h4{font-size:15px;margin:0 0 12px}
  .crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--sep)}
  .crow:first-of-type{border-top:none}
  .crow .ct{flex:1;min-width:0}
  .crow .ct .cs{font-size:12px;color:var(--text2);margin-top:3px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
  .field label{font-size:13px;font-weight:600}
  .field .desc,.desc{font-size:12px;color:var(--text2);line-height:1.55;font-weight:400}
  input[type=text],input[type=date],input[type=number],select,textarea{font-family:inherit;font-size:15px;border:1px solid var(--sep2);border-radius:9px;padding:9px 11px;background:var(--bg2);color:var(--text);width:100%;-webkit-appearance:none}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--tint);box-shadow:0 0 0 3px var(--tint-soft)}
  textarea{resize:vertical;min-height:54px}
  textarea.code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;min-height:120px}
  .frow{display:flex;gap:10px;flex-wrap:wrap}.frow>.field{flex:1;min-width:120px}
  .btn{border:none;border-radius:10px;padding:10px 18px;font-size:15px;font-weight:600;background:var(--tint);color:#fff}
  .btn:active{transform:scale(.98)}
  .btn.sec{background:var(--fill);color:var(--tint)}
  .btn.sm{padding:7px 13px;font-size:13px;border-radius:9px}
  .btn.warn{background:var(--fill);color:var(--red)}
  .btnrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
  .seg{display:flex;gap:0;background:var(--fill);border-radius:9px;padding:2px;margin-bottom:13px}
  .seg button{flex:1;border:none;background:transparent;border-radius:7px;padding:8px 4px;font-size:13.5px;font-weight:500;color:var(--text)}
  .seg button.sel{background:var(--bg2);box-shadow:var(--shadow);font-weight:600}
  .radios{display:flex;flex-direction:column;gap:8px}
  .radios label{display:flex;gap:10px;align-items:flex-start;font-size:14px;font-weight:500;padding:11px 13px;border:1px solid var(--sep2);border-radius:10px}
  .radios label.sel{border-color:var(--tint);background:var(--tint-soft)}
  .radios input{margin-top:2px}
  .radios .rd{font-size:11.5px;color:var(--text2);font-weight:400;margin-top:2px}
  .swatches{display:flex;gap:9px;flex-wrap:wrap}
  .sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative}
  .sw.sel{border-color:var(--text);box-shadow:0 0 0 2px var(--bg2) inset}
  table.lv{width:100%;border-collapse:collapse;font-size:13px}
  table.lv th{text-align:left;font-size:11px;color:var(--text2);font-weight:600;padding:4px 6px}
  table.lv td{padding:4px 6px;border-top:1px solid var(--sep)}
  table.lv input{padding:6px 8px;font-size:12.5px}table.lv input.n{width:62px}
  .ph{text-align:center;padding:44px 20px;color:var(--text2)}
  .ph h3{font-size:20px;color:var(--text);margin:10px 0 6px}.ph p{font-size:13px;max-width:420px;margin:0 auto;line-height:1.6}
  .recon{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff3f2;border:1px solid var(--red);border-radius:11px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--red)}
  .recon button{background:var(--red);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600}
  footer.foot{margin-top:26px;font-size:11.5px;color:var(--text2);text-align:center}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .scrim.on{display:flex}
  .modal{background:var(--bg2);width:100%;max-width:480px;border-radius:var(--r-lg);box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:90vh;overflow:auto}
  .mhead{padding:16px 18px 12px;border-bottom:1px solid var(--sep);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--bg2)}
  .mhead .d{font-size:18px;font-weight:700}
  .x{background:none;border:none;font-size:21px;color:var(--text2);line-height:1;padding:2px 6px;flex:none}
  .mbody{padding:16px 18px 20px}
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:rgba(40,40,42,.96);color:#fff;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;z-index:80}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ===== 背诵库 + 考试(并入) ===== */
  :root{ --R:#c0392b; --B:#2f5fa6; --G:#3f8a5b; --P:#7d57b0; --R-bg:#f7e4e0; --B-bg:#e3eaf6; --G-bg:#e2f0e6; --P-bg:#eee5f7; --serif:"Songti SC","STSong","SimSun",Georgia,"Times New Roman",serif; }
  @media (prefers-color-scheme: dark){ :root{ --R:#ff6f61; --B:#7aa7e6; --G:#5fc587; --P:#b89be0; --R-bg:#3a2320; --B-bg:#1f2a3d; --G-bg:#1e3127; --P-bg:#2c2440; } }
  .msub{ font-size:12px; color:var(--text2); margin-top:3px }
  .kempty{ background:var(--card); border:1.5px dashed var(--sep2); border-radius:var(--r-lg); padding:34px 20px; text-align:center; color:var(--text2); box-shadow:var(--shadow) }
  .kempty .big{ font-size:17px; font-weight:600; color:var(--text); margin-bottom:6px }
  .kempty code{ font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; background:var(--fill); padding:1px 5px; border-radius:5px }
  .stat{ font-size:12.5px; margin-top:8px; line-height:1.6; color:var(--text2) } .stat.ok{ color:var(--green) } .stat.bad{ color:var(--red) }

  .chrow{ display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--card); border:1px solid var(--sep); border-radius:var(--r); margin-bottom:10px; box-shadow:var(--shadow); transition:.14s }
  .chrow:hover{ border-color:var(--tint) }
  .chrow .seal{ width:40px; height:40px; flex:none; border-radius:10px; background:var(--tint); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px }
  .chrow .body{ flex:1; min-width:0; cursor:pointer } .chrow .nm{ font-weight:600; font-size:16px; line-height:1.3 }
  .chrow .meta{ font-size:11.5px; color:var(--text2); margin-top:3px } .chrow .meta b{ color:var(--tint) }
  .chrow .acts{ display:flex; gap:6px; flex:none; align-items:center } .ico{ background:none; border:1px solid var(--sep2); border-radius:8px; width:32px; height:32px; cursor:pointer; color:var(--text2); font-size:14px }
  .ico:hover{ border-color:var(--text); color:var(--text) }
  .chrow.click:hover{ border-color:var(--tint) } .chrow .chev{ font-size:22px; color:var(--text3); font-weight:300; padding:0 4px }
  .libsearch{ display:flex; gap:8px; margin:0 0 14px; flex-wrap:wrap } .libsearch input{ flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--sep2); border-radius:10px; background:var(--card); color:var(--text); font-size:14px }
  .srcard{ background:var(--card); border:1px solid var(--sep); border-radius:12px; padding:12px 14px; margin-bottom:10px; cursor:pointer; box-shadow:var(--shadow); transition:.14s } .srcard:hover{ border-color:var(--tint) }
  .srcard .srtext{ font-family:var(--serif); font-size:15px; line-height:1.75; color:var(--text) } .srcard .srfrom{ font-size:12px; color:var(--text2); margin-top:7px }
  mark.hl{ background:var(--B-bg); color:var(--B); border-radius:3px; padding:0 2px; font-weight:600 }

  .legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--text2); margin:0 0 14px } .legend .lg{ display:flex; align-items:center; gap:6px }
  .cdot{ width:11px; height:11px; border-radius:50%; flex:none } .cdot.R{ background:var(--R) } .cdot.B{ background:var(--B) } .cdot.G{ background:var(--G) } .cdot.P{ background:var(--P) }
  .backlink{ font-size:13px; color:var(--tint); background:none; border:none; cursor:pointer; font-weight:600; margin-bottom:10px; padding:0 } .backlink:hover{ text-decoration:underline }
  .subtabs{ display:inline-flex; background:var(--fill); border-radius:10px; padding:3px; gap:3px; margin-bottom:14px }
  .subtabs button{ font-size:13px; font-weight:600; color:var(--text2); background:none; border:none; border-radius:7px; padding:7px 16px; cursor:pointer }
  .subtabs button.sel{ background:var(--bg2); color:var(--text); box-shadow:var(--shadow) }
  .vtoolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px }
  .layertabs{ display:flex; gap:6px; flex-wrap:wrap } .layertabs button{ font-size:13px; font-weight:600; color:var(--text2); background:var(--card); border:1px solid var(--sep2); border-radius:9px; padding:7px 12px; cursor:pointer }
  .layertabs button.sel{ background:var(--text); color:var(--bg2); border-color:var(--text) }
  .toggle{ margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--text2) }
  .switch{ position:relative; width:46px; height:26px; background:var(--fill2); border-radius:99px; cursor:pointer; border:none; transition:.16s; flex:none }
  .switch.on{ background:var(--tint) } .switch::after{ content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.16s } .switch.on::after{ left:23px }
  .layerdesc{ font-size:12.5px; color:var(--text2); background:var(--fill); border-left:3px solid var(--tint); border-radius:0 8px 8px 0; padding:10px 14px; margin:0 0 14px; line-height:1.7 }
  .recitebar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--card); border:1px solid var(--sep); border-radius:var(--r); padding:11px 14px; margin:0 0 16px; box-shadow:var(--shadow); font-size:13px }
  .recitebar .rb-on{ color:var(--green); font-weight:600 } .recitebar .rb-off{ color:var(--text2) } .recitebar .rb-meta{ color:var(--text2) } .recitebar .rb-meta b{ color:var(--text) } .recitebar .btn{ margin-left:auto }
  .lessonscroll{ max-height:248px; overflow:auto; background:var(--card); border:1px solid var(--sep); border-radius:9px; margin-top:2px }
  .lessonscroll table.lv{ margin:0 } .lessonscroll thead th{ position:sticky; top:0; background:var(--card); z-index:1; box-shadow:0 1px 0 var(--sep) } .lessonscroll td:first-child,.lessonscroll th:first-child{ padding-left:10px }
  .tl{ border:1px solid var(--sep); border-radius:10px; overflow:hidden; margin:2px 0 10px; background:var(--card) }
  .tl-row{ display:flex; align-items:center; gap:8px; padding:7px 11px; font-size:13px; border-top:1px solid var(--sep) } .tl-row:first-child{ border-top:none }
  .tl-row.meal{ background:var(--fill); color:var(--text2) } .tl-row.ov{ background:var(--R-bg) }
  .tl-time{ font-variant-numeric:tabular-nums; font-weight:600; color:var(--text); width:96px; flex:none } .tl-dot{ width:9px; height:9px; border-radius:50%; flex:none }
  .tl-lab{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap } .tl-dur{ font-size:11.5px; color:var(--text2); flex:none }
  .tl-empty,.tl-un{ font-size:12px; color:var(--text2); padding:8px 2px } .tl-un{ color:var(--red) }

function pad(n){ return String(n).padStart(2,"0"); }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function iso(y,m,d){ return y+"-"+pad(m+1)+"-"+pad(d); }
function addDays(s,n){ const dt=new Date(s+"T00:00:00"); dt.setDate(dt.getDate()+n); return ymd(dt); }

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function today(){ return db.today || realToday(); }

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function firstOfMonth(s){ const dt=new Date(s+"T00:00:00"); return iso(dt.getFullYear(),dt.getMonth(),1); }

function fsSupported(){ return !!(window.showOpenFilePicker && window.showSaveFilePicker); }
function hasLS(){ try{ return typeof localStorage!=="undefined" && localStorage; }catch(e){ return false; } }
function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open("sh-fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("kv"); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbGet(k){ try{ const d2=await idbOpen(); return await new Promise((res,rej)=>{ const g=d2.transaction("kv","readonly").objectStore("kv").get(k); g.onsuccess=()=>res(g.result); g.onerror=()=>rej(g.error); }); }catch(e){ return null; } }
async function idbSet(k,v){ try{ const d2=await idbOpen(); await new Promise((res,rej)=>{ const tx=d2.transaction("kv","readwrite"); tx.objectStore("kv").put(v,k); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }catch(e){} }
async function fhPerm(h,request){ const o={mode:"readwrite"}; try{ if((await h.queryPermission(o))==="granted") return true; if(request&&(await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
function normalizeDb(o){
  o=o||{}; const d=blankDb();
  d.today=o.today||o.manualToday||null;
  d.savedAt=o.savedAt||null; /* 最后修改时间戳(用于导入时比对新旧) */
  d.settings=Object.assign(defaultSettings(),o.settings||{});
  if(!d.settings._cap3){ d.settings.reviewCapPerDay=3; d.settings._cap3=true; }
  d.settings.levels=(o.settings&&o.settings.levels&&o.settings.levels.length)?o.settings.levels:defaultLevels();
  d.settings.mastery=Object.assign(defaultSettings().mastery,(o.settings&&o.settings.mastery)||{});
  d.settings.starters=(o.settings&&Array.isArray(o.settings.starters)&&o.settings.starters.length)?o.settings.starters:[1,2,4];
  d.settings.historyUnlocked=false;
  const dtp=defaultSettings().timeplan; d.settings.timeplan=Object.assign({},dtp,(o.settings&&o.settings.timeplan)||{});
  d.settings.timeplan.periods=Object.assign({},dtp.periods,d.settings.timeplan.periods||{});
  d.settings.timeplan.meals=Object.assign({},dtp.meals,d.settings.timeplan.meals||{});
  d.timeplan=(o.timeplan&&typeof o.timeplan==="object")?o.timeplan:{};
  d.contents=o.contents||[]; d.courses=o.courses||[]; d.recites=o.recites||[]; d.plans=(o.plans||[]).filter(p=>p.kind==="review"||!p.courseId); d.userModules=o.userModules||[];
  d.contents.forEach(c=>{ if(c&&!Array.isArray(c.questions)) c.questions=[]; });
  db=d;
  // 远古原型 entries → recites
  if((!o.recites||!o.recites.length) && Array.isArray(o.entries)){
    o.entries.forEach(e=>{ if(e.type==="recite"){ const memo=e.cps&&e.cps[0]&&e.cps[0].done;
      const r={id:e.id||uid(),date:e.date,title:e.content||"背诵",courseId:null,lesson:null,ease:d.settings.ease0,cps:[{id:uid(),stage:0,kind:"memorize",due:e.date,done:!!memo,doneDate:memo?e.date:null,rating:null,ivl:0,relearn:false}],signals:[],examScores:[],fam:null};
      ensureNextReview(r); d.recites.push(r); } });
  }
  d.courses.forEach((c,i)=>{ if(!c.kind) c.kind="course"; if(c.mode!=="range") c.mode="cadence"; if(c.cadenceDays==null) c.cadenceDays=2; if(!c.startDate) c.startDate=today(); if(!c.color) c.color=APPLE_COLORS[i%APPLE_COLORS.length]; if(c.totalLessons==null) c.totalLessons=10; if(c.doneThrough==null) c.doneThrough=0;
    if(!Array.isArray(c.log)){ c.log=[]; if(c.done&&typeof c.done==="object"){ Object.keys(c.done).map(Number).sort((a,b)=>a-b).forEach(n=>c.log.push({date:c.done[String(n)],amount:1,lesson:n})); } delete c.done; }
    if(!Array.isArray(c.misses)) c.misses=[]; if(!Array.isArray(c.lessons)) c.lessons=[]; });
  d.recites.forEach(r=>{ if(!r.cps||!r.cps.length) r.cps=[{id:uid(),stage:0,kind:"memorize",due:r.date,done:false,doneDate:null,rating:null,ivl:0,relearn:false}]; r.signals=r.signals||[]; r.examScores=r.examScores||[]; if(r.ease==null) r.ease=d.settings.ease0; if(!r.title) r.title=r.content||"背诵"; if(r.courseId===undefined) r.courseId=null; if(r.cps[0].done) ensureNextReview(r); });
  // 一次性修正:历史上"一般"评级的迟到复习曾把下次间隔撑到迟到天数(elapsed),按正常 hard 间隔回收(只缩短不延长;幂等)
  if(!d._curveFixV1){ d.recites.forEach(r=>{ const rev=r.cps.filter(c=>c.kind==="review"),pend=rev.find(c=>!c.done),done=rev.filter(c=>c.done); if(!pend||!done.length) return; const last=done[done.length-1]; if(last.rating!=="hard") return; const corrected=nextIvlAfterDone(r),anchor=last.doneDate||last.due,newDue=addDays(anchor,corrected); if(newDue<pend.due){ pend.due=newDue; pend.ivl=corrected; } }); d._curveFixV1=true; }
  return d;
}
async function readFile(){ if(!fileHandle) return false; try{ const f=await fileHandle.getFile(); const t=await f.text(); lastFileText=t; if(t&&t.trim()) db=normalizeDb(JSON.parse(t)); return true; }catch(e){ return false; } }
async function writeFile(){ if(!fileHandle) return false; try{ const p=JSON.stringify(db,null,2); const w=await fileHandle.createWritable(); await w.write(p); await w.close(); lastFileText=p; return true; }catch(e){ needReconnect=true; updateFs(); return false; } }
async function refreshFromFile(silent){
  if(!fileHandle){ if(!silent) connectFile(); return; }
  let perm; try{ perm=await fileHandle.queryPermission({mode:"readwrite"}); }catch(e){ perm="prompt"; }
  if(perm!=="granted"){ needReconnect=true; updateFs(); if(!silent) reconnectFile(); return; }
  needReconnect=false;
  try{ const f=await fileHandle.getFile(); const t=await f.text(); if(t.trim()&&t!==lastFileText){ lastFileText=t; db=normalizeDb(JSON.parse(t)); render(); toast("已从文件刷新"); } updateFs(); }catch(e){}
}
function maybeAutoRefresh(){ if(document.getElementById("scrim").classList.contains("on")) return; if(fileHandle) refreshFromFile(true); csMaybePull(); }
async function connectFile(){ if(!fsSupported()){ alert("当前浏览器不支持文件同步,请用 Chrome / Edge,或用导出/导入。"); return; }
  try{ const [h]=await window.showOpenFilePicker({multiple:false,types:[{description:"数据文件",accept:{"application/json":[".json"]}}]}); if(!(await fhPerm(h,true))) return; fileHandle=h; needReconnect=false; await idbSet("fh",h); await readFile(); state.view="home"; render(); updateFs(); toast("已连接数据文件 ✓"); }catch(e){} }
async function createFile(){ if(!fsSupported()){ alert("当前浏览器不支持文件同步,请用 Chrome / Edge,或用导出/导入。"); return; }
  try{ const h=await window.showSaveFilePicker({suggestedName:"study-data.json",types:[{description:"数据文件",accept:{"application/json":[".json"]}}]}); if(!(await fhPerm(h,true))) return; fileHandle=h; needReconnect=false; await idbSet("fh",h); await writeFile(); updateFs(); toast("已新建数据文件 ✓"); }catch(e){} }
async function reconnectFile(){ if(!fileHandle){ return connectFile(); } if(await fhPerm(fileHandle,true)){ needReconnect=false; await readFile(); render(); updateFs(); toast("已恢复同步 ✓"); } }
function updateFs(){ const b=document.getElementById("reconnect"); if(b) b.style.display=needReconnect?"flex":"none"; const st=document.getElementById("fsStatus");
  if(st){ st.textContent=!fsSupported()?"此浏览器不支持文件同步(请用 Chrome/Edge,或用下方导出/导入)":needReconnect?"已连接,但需重新授权 → 点上方“恢复同步”":fileHandle?("已连接："+(fileHandle.name||"study-data.json")+" · 改动自动写入该文件"):"未连接(数据只存在本机浏览器)"; } }
async function load(){
  if(fsSupported()){ try{ const h=await idbGet("fh"); if(h){ fileHandle=h; if((await h.queryPermission({mode:"readwrite"}))==="granted"){ if(await readFile()){ updateFs(); return; } } else needReconnect=true; } }catch(e){} }
  if(hasLS()){ try{ const raw=localStorage.getItem(STORE_KEY); if(raw){ db=normalizeDb(JSON.parse(raw)); return; } }catch(e){}
    for(const k of OLD_KEYS){ try{ const r=localStorage.getItem(k); if(r){ db=normalizeDb(JSON.parse(r)); return; } }catch(e){} } }
  db=blankDb();
}
function setSave(t){ const el=document.getElementById("saveState"); if(!el) return; el.textContent=t; if(t==="已保存 ✓") setTimeout(()=>{ if(el.textContent==="已保存 ✓") el.textContent=""; },1600); }
async function save(opts){ opts=opts||{}; setSave("保存中…"); db.version=7; if(!opts.keepSavedAt) db.savedAt=new Date().toISOString(); const p=JSON.stringify(db); let ok=false; if(hasLS()){ try{ localStorage.setItem(STORE_KEY,p); ok=true; }catch(e){} } if(fileHandle&&!needReconnect){ if(await writeFile()) ok=true; } setSave(ok?"已保存 ✓":"保存失败(请用导出备份)"); if(!opts.noSync) csSchedulePush(); }

/* ===== 2.5 云同步 (GitHub Contents API;私有仓库存 study-data.json,全平台含 iPhone 都能用) =====
   开 App 自动拉最新、改完自动上传;令牌只存本机 localStorage,绝不写入同步数据。冲突按 savedAt 时间戳"较新者胜"。 */
const CS={ token:"", repo:"", path:"study-data.json", branch:"main", sha:null, status:"", busy:false, pending:false, applying:false, timer:null, lastPushedSavedAt:null };
let csLastPull=0;
function csLoadCfg(){ if(!hasLS()) return; try{ CS.token=localStorage.getItem("cs-token")||""; CS.repo=localStorage.getItem("cs-repo")||""; CS.path=localStorage.getItem("cs-path")||"study-data.json"; CS.branch=localStorage.getItem("cs-branch")||"main"; CS.sha=localStorage.getItem("cs-sha")||null; }catch(e){} }
function csSaveCfg(){ if(!hasLS()) return; try{ localStorage.setItem("cs-token",CS.token); localStorage.setItem("cs-repo",CS.repo); localStorage.setItem("cs-path",CS.path); localStorage.setItem("cs-branch",CS.branch); CS.sha?localStorage.setItem("cs-sha",CS.sha):localStorage.removeItem("cs-sha"); }catch(e){} }
function csConfigured(){ return !!(CS.token&&CS.repo); }
function csFmt(t){ try{ return t?new Date(t).toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):""; }catch(e){ return ""; } }
function csSetStatus(t,ok){ CS.status=t; const el=document.getElementById("csStatus"); if(el){ el.textContent=t; el.style.color=ok?"#2ca02c":""; } }
function b64enc(str){ const b=new TextEncoder().encode(str); let s="",CH=0x8000; for(let i=0;i<b.length;i+=CH) s+=String.fromCharCode.apply(null,b.subarray(i,i+CH)); return btoa(s); }
function b64dec(b64){ const bin=atob((b64||"").replace(/\s/g,"")); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return new TextDecoder().decode(b); }
function csApi(method,body){ const base="https://api.github.com/repos/"+CS.repo+"/contents/"+CS.path.split("/").map(encodeURIComponent).join("/"); const url=base+(method==="GET"?("?ref="+encodeURIComponent(CS.branch)+"&t="+Date.now()):""); return fetch(url,{ method, cache:"no-store", headers:{ "Authorization":"Bearer "+CS.token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" }, body: body?JSON.stringify(body):undefined }); }
async function csAdopt(remote,rt){ CS.applying=true; db=normalizeDb(remote); await save({noSync:true,keepSavedAt:true}); CS.applying=false; CS.lastPushedSavedAt=rt||db.savedAt; }
async function csDoPut(){ const body={ message:"sync "+(db.savedAt||""), content:b64enc(JSON.stringify(db)), branch:CS.branch }; if(CS.sha) body.sha=CS.sha;
  let r=await csApi("PUT",body);
  if(r.status===409||r.status===422){ const g=await csApi("GET"); if(g.ok){ const gj=await g.json(); CS.sha=gj.sha; let rem=null,rt=""; try{ rem=JSON.parse(b64dec(gj.content)); rt=rem.savedAt||""; }catch(e){}
      if(rem&&rt>(db.savedAt||"")){ await csAdopt(rem,rt); csSaveCfg(); render(); csSetStatus("云端有更新的数据,已采用云端 ✓",true); return; }
      body.sha=CS.sha; r=await csApi("PUT",body); } }
  if(r.status===401||r.status===403){ csSetStatus("令牌无效或无权限,请检查 Token/仓库",false); return; }
  if(!r.ok){ csSetStatus("上传失败("+r.status+")",false); return; }
  const j=await r.json(); if(j&&j.content&&j.content.sha) CS.sha=j.content.sha; CS.lastPushedSavedAt=db.savedAt; csSaveCfg(); csSetStatus("已上传到云端 ✓ "+csFmt(db.savedAt),true); }
async function csSync(opts){ opts=opts||{}; if(!csConfigured()) return; if(CS.busy){ CS.pending=true; return; } CS.busy=true; try{
    const r=await csApi("GET"); let remote=null, rt="";
    if(r.status===401||r.status===403){ csSetStatus("令牌无效或无权限,请检查 Token/仓库",false); return; }
    if(r.status===404){ CS.sha=null; }
    else if(!r.ok){ csSetStatus("拉取失败("+r.status+")",false); return; }
    else { const j=await r.json(); CS.sha=j.sha; try{ remote=JSON.parse(b64dec(j.content)); rt=remote.savedAt||""; }catch(e){ remote=null; } }
    csSaveCfg();
    const lt=db.savedAt||"";
    if(remote && rt>lt){ await csAdopt(remote,rt); render(); csSetStatus("已拉取云端最新 ✓ "+csFmt(rt),true); if(!opts.silent) toast("已从云端同步最新 ✓"); return; }
    if(lt && (!remote || lt>rt || lt!==CS.lastPushedSavedAt)){ await csDoPut(); return; }
    csSetStatus("已是最新 ✓ "+csFmt(rt||lt||db.savedAt),true);
  }catch(e){ csSetStatus("同步出错(网络离线?)",false); }
  finally{ CS.busy=false; if(CS.pending){ CS.pending=false; setTimeout(()=>csSync({silent:true}),400); } } }
function csSchedulePush(){ if(!csConfigured()) return; if(CS.timer) clearTimeout(CS.timer); CS.timer=setTimeout(()=>{ CS.timer=null; csSync({silent:true}); },2500); }
function csMaybePull(){ if(!csConfigured()) return; const sc=document.getElementById("scrim"); if(sc&&sc.classList.contains("on")) return; const now=Date.now(); if(now-csLastPull<15000) return; csLastPull=now; csSync({silent:true}); }
async function csConnect(token,repo,path){ CS.token=(token||"").trim(); CS.repo=(repo||"").trim().replace(/^https?:\/\/github\.com\//i,"").replace(/\.git$/i,"").replace(/^\/+|\/+$/g,""); CS.path=((path||"").trim())||"study-data.json"; CS.sha=null; CS.lastPushedSavedAt=null; csSaveCfg(); csSetStatus("连接中…",false); await csSync({}); }
function csDisconnect(){ CS.token=""; CS.repo=""; CS.sha=null; CS.lastPushedSavedAt=null; if(hasLS()){ ["cs-token","cs-repo","cs-sha"].forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} }); } csSetStatus("已断开(本机数据保留)",false); }

/* ===== 习思想文件夹 → 背诵库 自动重导入（绑定一次，打开自动同步各章 var CHAPTER；按“第X章”匹配，覆盖内容、保留题库与掌握度） ===== */
let libDir=null, libNeedGrant=false;
function chapKey(t){ if(!t) return ""; t=String(t).replace(/[\s　]/g,""); const m=t.match(/^第[一二三四五六七八九十百零〇\d]+章/); return m?m[0]:t; }
/* 把编辑器保存的扁平进度(MODEL: lines/meta) 还原成 study-hub 需要的章节结构(layers/items)——即 buildModel 的逆运算 */
function modelToChapter(m,title,subtitle){
  const byL={}; (m.lines||[]).forEach(ln=>{ (byL[ln.layer]=byL[ln.layer]||[]).push(ln); });
  const layers=(m.meta||[]).map(mt=>{ const items=[],lns=byL[mt.id]||[]; let i=0;
    while(i<lns.length){ const ln=lns[i];
      if(ln.type==="boxhead"){ const bx={t:"box",style:ln.box||"link",title:ln.text,items:[]}; let j=i+1;
        while(j<lns.length&&lns[j].type==="boxbody"&&(lns[j].box||"link")===(ln.box||"link")){ bx.items.push({t:"p",text:lns[j].text}); j++; }
        items.push(bx); i=j; }
      else if(ln.type==="h1"){ items.push({t:"h",lvl:1,text:ln.text}); i++; }
      else if(ln.type==="h2"){ items.push({t:"h",lvl:2,text:ln.text}); i++; }
      else if(ln.type==="sub"){ items.push({t:"sub",text:ln.text}); i++; }
      else { items.push({t:"p",text:ln.text}); i++; } }
    return {id:mt.id,name:mt.name,desc:mt.desc,items}; });
  return {title:title||"",subtitle:subtitle||"",layers}; }
async function libPerm(h,request){ const o={mode:"read"}; try{ if((await h.queryPermission(o))==="granted") return true; if(request&&(await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
function setLibStatus(){ const rb=document.getElementById("btnLibResume"); if(rb) rb.style.display=(libDir&&libNeedGrant)?"inline-block":"none";
  const el=document.getElementById("libStatus"); if(!el) return;
  el.textContent = !window.showDirectoryPicker ? "需 Chrome/Edge" : libNeedGrant ? "点“恢复自动导入”授权一次" : libDir ? ("已绑定 "+(libDir.name||"习思想")+"，打开自动同步") : "未绑定 习思想 文件夹";
  el.style.color = (libDir&&!libNeedGrant) ? "#2e9e5b" : "var(--text2)"; }
function upsertContent(parsed){ const key=chapKey(parsed.title);
  const ex=db.contents.find(c=>chapKey((c.data&&c.data.title)||c.name)===key);
  if(ex){ if(JSON.stringify(ex.data)===JSON.stringify(parsed)) return "same"; ex.data=parsed; ex.uploadedAt=today(); return "updated"; }
  db.contents.push({id:uid(),name:(parsed.title||"未命名章节").replace(/\s+/g," ").trim(),data:parsed,questions:[],uploadedAt:today()}); return "added"; }
async function importLibFromDir(verbose){ if(!libDir) return;
  const htmlByKey={};
  try{ for await (const [nm,h] of libDir.entries()){
      if(h.kind==="file" && /挖空编辑器.*\.html$/i.test(nm)){
        try{ const f=await h.getFile(); const ch=parseChapter(await f.text());
          if(ch){ const k=chapKey(ch.title)||nm; if(!htmlByKey[k]||f.lastModified>htmlByKey[k].mt) htmlByKey[k]={ch:ch,mt:f.lastModified}; } }catch(e){} } }
  }catch(e){ libNeedGrant=true; setLibStatus(); if(verbose) toast("读取文件夹失败，点“恢复自动导入”重试"); return; }
  const jsonByKey={};
  async function scanJson(dh){ try{ for await (const [nm,h] of dh.entries()){
      if(h.kind!=="file"||!/\.json$/i.test(nm)) continue; const k=chapKey(nm); if(!k) continue;
      try{ const f=await h.getFile(); const mdl=JSON.parse(await f.text());
        if(mdl&&Array.isArray(mdl.lines)&&Array.isArray(mdl.meta)){ if(!jsonByKey[k]||f.lastModified>jsonByKey[k].mt) jsonByKey[k]={mdl:mdl,mt:f.lastModified,name:nm}; } }catch(e){} } }catch(e){} }
  await scanJson(libDir);
  try{ const jdir=await libDir.getDirectoryHandle("json"); await scanJson(jdir); }catch(e){}
  const keys={}; Object.keys(htmlByKey).forEach(k=>keys[k]=1); Object.keys(jsonByKey).forEach(k=>keys[k]=1);
  let nUp=0,nAdd=0;
  Object.keys(keys).forEach(k=>{
    const html=htmlByKey[k], js=jsonByKey[k];
    let title=html?html.ch.title:"", subtitle=html?html.ch.subtitle:"";
    if(!title){ const ex=db.contents.find(c=>chapKey((c.data&&c.data.title)||c.name)===k); if(ex){ title=(ex.data&&ex.data.title)||ex.name||k; subtitle=(ex.data&&ex.data.subtitle)||""; } }
    if(!title && js){ title=String(js.name).replace(/\.json$/i,"").replace(/(挖空)?_?(进度|挖空编辑器).*$/,"").replace(/_/g," ").trim()||k; }
    let ch = html ? html.ch : null;
    if(js && js.mdl && Array.isArray(js.mdl.lines) && (!html || js.mt>=html.mt)){ const conv=modelToChapter(js.mdl,title,subtitle); if(conv.layers&&conv.layers.length) ch=conv; }
    if(!ch) return;
    const r=upsertContent(ch); if(r==="updated")nUp++; else if(r==="added")nAdd++;
  });
  if(nUp+nAdd>0){ await save(); render(); }
  libNeedGrant=false; setLibStatus();
  if(verbose) toast((nUp+nAdd)?("背诵库已同步：更新 "+nUp+" 章 / 新增 "+nAdd+" 章"):"背诵库已是最新（无变化）"); }
async function pickLibDir(){ if(!window.showDirectoryPicker){ toast("此浏览器不支持文件夹自动导入，请用 Chrome / Edge"); return; }
  try{ const h=await window.showDirectoryPicker({mode:"read"}); if(!(await libPerm(h,true))) return; libDir=h; libNeedGrant=false; await idbSet("libDir",h); await importLibFromDir(true); }
  catch(e){ if(e&&e.name==="AbortError") return; toast("绑定失败："+(e&&e.message||e)); } }
async function resumeLibDir(){ if(!libDir){ return pickLibDir(); } if(await libPerm(libDir,true)){ libNeedGrant=false; await importLibFromDir(true); } else toast("授权被拒绝"); }
async function autoImportOnBoot(){ if(!window.showDirectoryPicker) return;
  try{ const h=await idbGet("libDir"); if(!h) return; libDir=h;
    if((await h.queryPermission({mode:"read"}))==="granted"){ await importLibFromDir(false); }
    else { libNeedGrant=true; setLibStatus();
      const once=()=>{ document.removeEventListener("pointerdown",once,true); document.removeEventListener("keydown",once,true); resumeLibDir(); };
      document.addEventListener("pointerdown",once,true); document.addEventListener("keydown",once,true); }
  }catch(e){} }

/* ===== 3. 复习内核 (自适应 ease,失误不清零) ===== */
function reviewCps(r){ return r.cps.filter(c=>c.kind==="review"); }
function doneGoodCps(r){ return r.cps.filter(c=>c.kind==="review"&&c.done&&c.rating!=="again"); }
function lastReviewDate(r){ const d=r.cps.filter(c=>c.kind==="review"&&c.done); return d.length?d[d.length-1].doneDate:null; }
function lastIvl(r){ const d=r.cps.filter(c=>c.kind==="review"&&c.done); return d.length?d[d.length-1].ivl:(db.settings.starters[0]||1); }
function prevDate(r,cp){ const i=r.cps.indexOf(cp); for(let j=i-1;j>=0;j--){ const c=r.cps[j]; if(c.done&&c.doneDate) return c.doneDate; } return r.cps[0].doneDate||r.cps[0].due; }
function ensureNextReview(r){ const pending=reviewCps(r).find(c=>!c.done); if(pending) return pending;

/* ===== 4. 掌握度 & 熟悉度 ===== */

/* ===== 5. 课程(=课程/规划/背诵 统一):按节奏自动排期,漏了整门顺延 ===== */
function lessonAmount(c){ const m={}; for(let i=1;i<=(c.doneThrough||0);i++) m[i]=1; (c.log||[]).forEach(e=>{ if(e.lesson!=null) m[e.lesson]=(m[e.lesson]||0)+(e.amount||1); }); return m; }

function courseNext(c){ const ni=courseNextItem(c); if(!ni) return null; const it=courseItems(c).find(x=>x.upcoming); return {lesson:ni.lesson,half:ni.half,due:it?it.date:today()}; }

/* ===== 6. 内容层:token 引擎 + 章节解析 + 出题原料(并入原型,统一认 [[答案|C]] / 〔提示〕 / ‹上色›) ===== */
/* 颜色类别:R 核心/数字/最 · B 关键定性/时间节点 · G 原理/口诀 · P 补充 */
const COLORS={R:{name:"核心 / 数字 / 最"},B:{name:"关键定性 / 时间节点"},G:{name:"原理 / 口诀"},P:{name:"补充"}};
const CLOZE_RE=/\[\[([^\]|]+)\|([RBGP])\]\]|〔([^〕]*)〕|‹([^|›]*)\|([RBGPK\-])\|([YN\-])›/g;

    if(m[1]!==undefined) t.push({type:"blank",ans:m[1],color:m[2]});

  else if(tk.type==="hint"){ const f="〔"+tk.text+"〕"; for(let i=0;i<f.length;i++) o.push({ti,ci:i,kind:"hint",ch:f[i]}); }
  else if(tk.type==="blank"){ for(let i=0;i<tk.ans.length;i++) o.push({ti,ci:i,kind:"blank",ch:tk.ans[i],color:tk.color}); } }); return o; }
function selInfo(proj,a,b){ if(a<0||b>proj.length||a>=b) return null; const s=proj.slice(a,b),ti=s[0].ti;
  return { text:s.map(p=>p.ch).join(""), allPlain:s.every(p=>p.ti===ti&&p.kind==="plain"), ti, ci0:s[0].ci, ci1:s[s.length-1].ci+1 }; }

  const m=[]; nt.forEach(x=>{ const l=m[m.length-1]; if(l&&l.type==="plain"&&x.type==="plain") l.text+=x.text; else m.push(Object.assign({},x)); }); return m; }
function renderText(text,reveal){ return parseTokens(text).map(tk=>{

  if(tk.type==="hint") return '<span class="cue">〔'+esc(tk.text)+'〕</span>';
  if(tk.type==="color") return esc(tk.text);
  const c=tk.color,b=esc(tk.ans);
  if(reveal) return '<span class="bk shown '+c+'">'+b+'</span>';
  return '<span class="bk hidden '+c+'" data-ans="'+b+'" tabindex="0" role="button">'+b+'</span>'; }).join(""); }
function parseChapter(htmlText){ const s=[],re=/<script[^>]*>([\s\S]*?)<\/script>/gi; let m; while((m=re.exec(htmlText))) s.push(m[1]);

  try{ const fn=new Function("module","exports",body+"\n;return typeof CHAPTER!=='undefined'?CHAPTER:null;"); const ch=fn(undefined,undefined);
    if(ch&&Array.isArray(ch.layers)) return ch; }catch(e){} return null; }
function eachBlock(ch,cb){ (ch.layers||[]).forEach((layer,li)=>{ const visit=(items,path)=>{ items.forEach((it,ii)=>{
  const p=path.concat(ii); if(typeof it.text==="string") cb(it,layer,li,p); if(it.items) visit(it.items,p.concat("items")); }); };
  visit(layer.items,[li,"items"]); }); }

function getBlockText(ch,path){ let node=ch.layers; for(let i=0;i<path.length;i++) node=node[path[i]]; return node.text; }

/* ===== 9.5 时间分配(当天/明天):指定起止 或 预计时长自动排;午/晚饭各留1.5h ===== */
function toMin(s){ if(!s) return 0; const m=String(s).split(":"); return (+m[0])*60+(+(m[1]||0)); }
function toHM(v){ v=Math.max(0,Math.round(v)); return pad(Math.floor(v/60)%24)+":"+pad(v%60); }
function fmtMins(m){ const h=Math.floor(m/60),mm=m%60; return ((h?h+"小时":"")+(mm?mm+"分":""))||"0分"; }

function tpMeals(){ const M=db.settings.timeplan.meals; return [{label:"🍚 午饭",start:M.lunch[0],end:M.lunch[1]},{label:"🍚 晚饭",start:M.dinner[0],end:M.dinner[1]}]; }
function subtractIntervals(win,blocks){ let free=[{s:win[0],e:win[1]}];
  blocks.slice().sort((a,b)=>a.s-b.s).forEach(b=>{ const next=[];
    free.forEach(f=>{ if(b.e<=f.s||b.s>=f.e){ next.push(f); return; } if(b.s>f.s) next.push({s:f.s,e:b.s}); if(b.e<f.e) next.push({s:b.e,e:f.e}); });
    free=next.filter(f=>f.e-f.s>=1); });
  return free; }
function dayPlannables(dd){ const it=dayItems(dd),out=[];
  it.lessons.forEach(L=>{ if(L.done||L.missed) return; const cn=(lessonMeta(L.course,L.lesson).name||"").trim(); out.push({key:"L:"+L.course.id+":"+L.lesson,label:(cn||L.course.name)+" 第"+L.lesson+"节",color:courseColor(L.course)}); });
  it.reviews.forEach(o=>{ if(o.cp.done) return; out.push({key:"R:"+o.recite.id+":"+o.cp.id,label:"复习 "+o.recite.title,color:reciteColor(o.recite)}); });
  it.plans.forEach(p=>{ if(p.done||p.missed) return; out.push({key:"P:"+p.id,label:(p.kind==="review"?"复习规划":p.content),color:p.color||"#8e8e93"}); });
  return out; }
function tpGet(dd){ db.timeplan=db.timeplan||{}; return db.timeplan[dd]||(db.timeplan[dd]={}); }

function timerCtlHtml(key,dd){ if(dd!==today()) return '';
  if(taskTimer&&taskTimer.key===key) return '<span class="tk-run">⏱ <b id="taskDisp">'+fmtDur(taskElapsed())+'</b>'+(taskTimer.paused?'<button class="rb rb-good" data-tkresume="1">继续</button>':'<button class="rb" data-tkpause="1">暂停</button>')+'<button class="rb rb-skip" data-tkend="1">结束</button></span>';

function autoDistribute(dd){ const tp=tpGet(dd),win=db.settings.timeplan.window,W=[toMin(win[0]),toMin(win[1])],plist=dayPlannables(dd);
  const fixed=[]; plist.forEach(p=>{ const e=tp[p.key]; if(e&&e.mode==="fixed"&&e.start&&e.end) fixed.push({s:toMin(e.start),e:toMin(e.end)}); });
  const meals=tpMeals().map(m=>({s:toMin(m.start),e:toMin(m.end)}));
  let free=subtractIntervals(W,fixed.concat(meals));
  const periods=tpPeriods(),prange=k=>{ const f=periods.find(x=>x[0]===k); return f?[toMin(f[2][0]),toMin(f[2][1])]:null; };
  const carve=(s,e)=>{ const nx=[]; free.forEach(f=>{ if(e<=f.s||s>=f.e){ nx.push(f); return; } if(f.s<s)nx.push({s:f.s,e:s}); if(e<f.e)nx.push({s:e,e:f.e}); }); free=nx; };
  const tryPlace=(e,range)=>{ const need=e.durMin; for(const f of free){ const s=Math.max(f.s,range?range[0]:f.s),en=Math.min(f.e,range?range[1]:f.e); if(en-s>=need){ e.start=toHM(s); e.end=toHM(s+need); e._un=false; carve(s,s+need); return true; } } return false; };

let taskTimer=null;

function stopTaskInterval(){ if(taskTimer&&taskTimer.intervalId) clearInterval(taskTimer.intervalId); }
function taskElapsed(){ if(!taskTimer) return 0; return taskTimer.accumSec+(taskTimer.paused?0:(Date.now()-taskTimer.startTs)/1000); }

function startTaskTimer(dd,key){ stopTimerInterval(); timerState=null; stopTaskInterval();

  const isRec=info.kind==="lesson"&&((db.courses.find(c=>c.id===info.courseId)||{}).kind==="recite"),rate=isRec||info.kind==="review";

/* ===== 10. 课程(统一:课程 / 规划 / 背诵) ===== */
function mountCourses(main){
  let h='<h2 class="mod-h">课程</h2><div class="mod-sub">课程 / 背诵 / 习题课都在这里建,这里管总体规划;每天的细节(完成、半节、没完成、补记、计时)在「日历」当天面板里调。两种排期:按节奏(每隔几天一节,漏了整体顺延)或按日期段(把剩余节数均匀铺到一段日期里,并参考各天负载尽量摊平)。背诵课每节完成后进入记忆曲线复习;习题课在主页可计时并记录每次用时。每门课自定颜色。</div>';
  h+='<div class="card"><h4>我的课程</h4><div id="courseList"></div><button class="btn sm" id="addCourse" style="margin-top:10px">＋ 新建课程</button></div>';
  main.innerHTML=h; renderCourseList();
  document.getElementById("addCourse").onclick=()=>editCourse(null);
}
let _courseOpen=null;
function renderCourseList(){
  const host=document.getElementById("courseList"); if(!host) return;
  if(!db.courses.length){ host.innerHTML='<div class="empty">还没有课程。点下面新建。</div>'; return; }
  host.innerHTML=db.courses.map(c=>{ const at=courseProgress(c),pct=c.totalLessons?Math.round(at/c.totalLessons*100):0,nx=courseNext(c),kindTxt=c.kind==="recite"?"背诵":c.kind==="exercise"?"习题":"课程";
    const sched=c.mode==="range"?('区间 '+(c.rangeStart||"?")+' → '+(c.rangeEnd||"?")):('每 '+c.cadenceDays+' 天一节');
    const atTxt=Number.isInteger(at)?String(at):(Math.floor(at)+'.5');
    let summary='';
    if(c.kind==="recite"){ const linkCnt=(c.lessons||[]).filter(l=>l&&l.contentId).length; summary='<div class="cs" style="margin-top:3px">逐节命名 / 链接：<b>'+linkCnt+'</b> / '+(c.totalLessons||0)+' 节已链接背诵库</div>'; }
    else if(c.kind==="exercise"){ const ts=exerciseTimes(c),totSec=ts.reduce((a,t)=>a+(t.sec||0),0); summary='<div class="cs" style="margin-top:3px">已计时 <b>'+ts.length+'</b> / '+(c.totalLessons||0)+' 节'+(ts.length?' · 总用时 <b>'+fmtDur(totSec)+'</b>':'')+'</div>'; }
    const canExpand=(c.kind==="recite"||c.kind==="exercise");
    const lessonsBtn=canExpand?'<button data-lc="'+c.id+'" title="'+(c.kind==="recite"?"各节命名 / 链接背诵库":"各节命名 / 用时")+'" style="'+(_courseOpen===c.id?'color:var(--tint)':'')+'">'+(c.kind==="recite"?"📖":"⏱")+'</button>':'';
    let row='<div class="crow"><span class="gdot" style="background:'+courseColor(c)+';width:14px;height:14px"></span><div class="ct"><div style="font-weight:600">'+esc(c.name)+' <span style="font-size:11px;color:var(--text2);font-weight:400">'+kindTxt+'</span></div><div class="cs">共 '+(c.totalLessons||"?")+' 节 · '+sched+' · 已完成 '+atTxt+' 节'+(nx?' · 下节 '+fmtLong(nx.due)+(nx.half?'(下半)':''):' · 已全部完成')+'</div><div class="mbar"><i style="width:'+clamp(pct,0,100)+'%;background:'+courseColor(c)+'"></i></div>'+summary+'</div><div class="gacts">'+lessonsBtn+'<button data-ec="'+c.id+'">✎</button><button data-dc="'+c.id+'">🗑</button></div></div>';
    if(_courseOpen===c.id&&canExpand) row+=lessonEditorHtml(c);
    return row;
  }).join("");
  host.querySelectorAll("button[data-lc]").forEach(b=>b.onclick=()=>{ _courseOpen=(_courseOpen===b.dataset.lc?null:b.dataset.lc); renderCourseList(); });
  host.querySelectorAll("button[data-ec]").forEach(b=>b.onclick=()=>editCourse(b.dataset.ec));
  host.querySelectorAll("button[data-dc]").forEach(b=>b.onclick=async()=>{ const c=db.courses.find(x=>x.id===b.dataset.dc); if(!confirm("删除「"+(c?c.name:"")+"」?它已生成的背诵复习也会一并删除。")) return; db.recites=db.recites.filter(r=>r.courseId!==b.dataset.dc); db.courses=db.courses.filter(x=>x.id!==b.dataset.dc); await save(); render(); });
  wireLessonEditor(host);
}
function ensureLessonSlot(c,i){ c.lessons=c.lessons||[]; while(c.lessons.length<i) c.lessons.push({name:"",contentId:null}); if(!c.lessons[i-1]) c.lessons[i-1]={name:"",contentId:null}; }
function syncLessonRecite(c,i){ const rec=db.recites.find(r=>r.courseId===c.id&&r.lesson===i); if(rec){ rec.title=lessonTitle(c,i); const m=lessonMeta(c,i); rec.contentId=m.contentId||null; rec.fam=famScore(rec); } }
function reciteStatBar(c){
  const recs=db.recites.filter(r=>r.courseId===c.id);
  const linkCnt=(c.lessons||[]).filter(l=>l&&l.contentId).length;
  if(!recs.length) return '<div class="recitebar" style="margin:0 0 12px;gap:16px"><span class="rb-off">还没有已背诵的节(完成某节后进入记忆曲线,这里显示平均掌握度)</span><span class="rb-meta">已链接背诵库 <b>'+linkCnt+'</b> / '+(c.totalLessons||0)+' 节</span></div>';
  const ms=recs.map(r=>mastery(r)),avg=ms.reduce((a,b)=>a+b,0)/ms.length;
  return '<div class="recitebar" style="margin:0 0 12px;gap:16px"><span class="rb-meta">已背诵 <b>'+recs.length+'</b> 节</span><span class="rb-meta">平均掌握度 <b>'+Math.round(avg*100)+'%</b></span><span class="rb-meta">已链接背诵库 <b>'+linkCnt+'</b> / '+(c.totalLessons||0)+' 节</span></div>';
}
function exerciseStatBar(c){
  const ts=exerciseTimes(c).filter(t=>t.sec!=null);
  if(!ts.length) return '<div class="recitebar" style="margin:0 0 12px"><span class="rb-off">还没有计时记录(在日历「▶ 开始计时」完成某节后显示)</span></div>';
  const secs=ts.map(t=>t.sec),avgAll=secs.reduce((a,b)=>a+b,0)/secs.length,last=secs[secs.length-1],last3=secs.slice(-3),avg3=last3.reduce((a,b)=>a+b,0)/last3.length;
  return '<div class="recitebar" style="margin:0 0 12px;gap:16px"><span class="rb-meta">已计时 <b>'+ts.length+'</b> 节</span><span class="rb-meta">平均用时 <b>'+fmtDur(avgAll)+'</b></span><span class="rb-meta">最近一次 <b>'+fmtDur(last)+'</b></span><span class="rb-meta">近'+last3.length+'次 <b>'+fmtDur(avg3)+'</b>（'+last3.map(fmtDur).join(' / ')+'）</span></div>';
}
function exerciseEditorHtml(c,n){
  let h='<div class="card" style="margin:2px 0 14px;background:var(--fill)"><h4 style="margin-bottom:6px">「'+esc(c.name)+'」每节命名 / 用时</h4>'+
    '<div class="desc" style="margin-bottom:10px">给每节起名(留空＝默认"'+esc(c.name)+' 第N节")。计时、完成、补记仍在「日历」当天面板里做;这里汇总查看。近几次用时只统计「有计时」的节,没计时的跳过、不计入也不计算。</div>';
  h+=exerciseStatBar(c);
  const doneMap={},missMap={},upMap={};
  (c.log||[]).forEach(e=>{ if(e.lesson==null) return; const d=(doneMap[e.lesson]=doneMap[e.lesson]||{sec:0,hasSec:false,amount:0,date:e.date,entries:[]}); if(e.sec!=null){ d.sec+=e.sec; d.hasSec=true; } d.amount+=(e.amount||1); d.date=e.date; d.entries.push(e); });
  (c.misses||[]).forEach(m=>{ if(m.lesson!=null&&missMap[m.lesson]==null) missMap[m.lesson]=m.date; });
  courseItems(c).forEach(x=>{ if(x.upcoming&&x.lesson!=null&&upMap[x.lesson]==null) upMap[x.lesson]=x.date; });
  h+='<div class="lessonscroll"><table class="lv"><thead><tr><th style="width:52px">节</th><th>名称</th><th style="width:46%">状态 / 用时</th></tr></thead><tbody>';
  for(let i=1;i<=n;i++){ const m=(c.lessons&&c.lessons[i-1])||{}; let stat;
    if(doneMap[i]){ const d=doneMap[i]; const mins=d.hasSec?Math.round(d.sec/60):'';
      let breakdown=''; const halfEntries=(d.entries||[]).filter(e=>(e.amount||1)<1);
      if(halfEntries.length){ const fh=(d.entries||[]).find(e=>(e.amount||1)<1&&!e.half), sh=(d.entries||[]).find(e=>e.half); const segs=['总 '+fmtDur(d.sec)]; if(fh&&fh.sec!=null) segs.push('前半 '+fmtDur(fh.sec)); if(sh&&sh.sec!=null) segs.push('后半 '+fmtDur(sh.sec)); breakdown=' <span class="rb-meta" style="font-size:11px;color:var(--text2)">（'+segs.join(' · ')+'）</span>'; }
      stat='<span style="color:var(--green)">✓ 完成</span>'+(d.amount<1?'（仅半节）':'')+' · 用时 <input type="number" min="0" step="1" data-extime="'+i+'" value="'+mins+'" placeholder="未计时" style="width:66px"> 分钟'+breakdown; }
    else if(missMap[i]!=null) stat='<span style="color:var(--red)">✗ 没完成</span>';
    else if(upMap[i]!=null) stat='<span class="rb-meta">待做 · '+fmtLong(upMap[i])+'</span>';
    else stat='<span style="color:var(--text2)">—</span>';
    h+='<tr><td>第'+i+'节</td><td><input type="text" data-ln="'+i+'" value="'+esc(m.name||"")+'" placeholder="'+esc(c.name+" 第"+i+"节")+'"></td><td>'+stat+'</td></tr>';
  }
  h+='</tbody></table></div></div>';
  return h;
}
function lessonEditorHtml(c){
  const n=c.totalLessons||0;
  if(c.kind==="exercise") return exerciseEditorHtml(c,n);
  let h='<div class="card" style="margin:2px 0 14px;background:var(--fill)"><h4 style="margin-bottom:6px">「'+esc(c.name)+'」每节命名 / 链接背诵库</h4>'+
    '<div class="desc" style="margin-bottom:10px">给每节起名(留空＝默认"'+esc(c.name)+' 第N节")。链接到背诵库某一整章后,日历里复习这节可「先测验」,测验成绩会按设置里的权重并入掌握度、影响排期。</div>';
  if(!db.contents.length) h+='<div class="desc" style="margin-bottom:10px;color:var(--orange)">⚠ 背诵库还没有章节,先到「背诵库」上传章节,才能在这里链接。仍可先填名称。</div>';

  for(let i=1;i<=n;i++){ const m=(c.lessons&&c.lessons[i-1])||{};
    const rec=db.recites.find(r=>r.courseId===c.id&&r.lesson===i);
    const revTxt=rec?String(reviewCps(rec).filter(cp=>cp.done).length):'—';

    const pend=rec?reviewCps(rec).find(cp=>!cp.done):null,overdue=pend&&pend.due<tdy;
    const nextTxt=pend?(overdue?'逾期·'+fmtShort(pend.due):pend.due===tdy?'今天':fmtShort(pend.due)):'—';
    h+='<tr><td>第'+i+'节</td><td><input type="text" data-ln="'+i+'" value="'+esc(m.name||"")+'" placeholder="'+esc(c.name+" 第"+i+"节")+'"></td>'+
      '<td><select data-lk="'+i+'"><option value="">（不链接）</option>'+db.contents.map(ct=>'<option value="'+ct.id+'"'+(m.contentId===ct.id?' selected':'')+'>'+esc(ct.name)+'</option>').join('')+'</select></td>'+
      '<td style="text-align:center;color:var(--text2)">'+revTxt+'</td><td style="text-align:center;font-weight:600'+(rec?';color:var(--tint)':';color:var(--text2)')+'">'+masTxt+'</td>'+
      '<td style="text-align:center;font-size:12px'+(overdue?';color:var(--red);font-weight:700':pend&&pend.due===tdy?';color:var(--orange);font-weight:700':';color:var(--text2)')+'">'+nextTxt+'</td></tr>';
  }
  h+='</tbody></table></div></div>';
  return h;
}
function setExerciseTime(c,lesson,sec){ const entries=(c.log||[]).filter(e=>e.lesson===lesson); if(!entries.length) return; entries.forEach((e,i)=>{ e.sec=(sec==null)?null:(i===0?sec:0); }); }

function itemPlain(text){ return parseTokens(text||"").map(tk=>tk.type==="blank"?tk.ans:tk.type==="hint"?"":tk.text).join(""); }
function searchCourseLib(contents,q){ const nq=q.trim(); if(!nq) return []; const out=[],seen=new Set();
  contents.forEach(ct=>{ const layers=ct.data.layers||[],layer=layers[1]||layers[0]; if(!layer) return;  // 只搜第二层(教材全文),避免各层重复
    const visit=items=>items.forEach(it=>{
      if(typeof it.text==="string"){ const plain=itemPlain(it.text),sents=plain.match(/[^。！？；!?;\n]*[。！？；!?;\n]|[^。！？；!?;\n]+/g)||[];
        sents.forEach(s=>{ const st=s.trim(); if(st&&st.indexOf(nq)>=0){ const k=ct.id+"|"+st; if(!seen.has(k)){ seen.add(k); out.push({chapterId:ct.id,chapterName:ct.name,sentence:st}); } } }); }
      if(it.items) visit(it.items); }); visit(layer.items); });
  return out; }
function hl(s,q){ const e=esc(s),qq=esc(q); return qq?e.split(qq).join('<mark class="hl">'+qq+'</mark>'):e; }

function openUpload(updateId){

/* ---- 出题位置:每题记录所在块 + token 区间,据此标识/排序/点击跳转 ---- */
let _authQLoc=null;
const QTYPE_RGB={ fill:"47,95,166", mc:"125,87,176", tf:"63,138,91", match:"199,109,32" };  // 填空蓝/选择紫/判断绿/连线橙
function blockPaths(c){ const out=[];
  (c.data.layers||[]).forEach((layer,li)=>{ const visit=(items,base)=>{ (items||[]).forEach((it,ii)=>{ const p=base.concat(ii);
    if(it.t==="box"){ (it.items||[]).forEach((s,si)=>out.push({path:p.concat("items",si),text:s.text})); }
    else out.push({path:p,text:it.text}); }); }; visit(layer.items,[li,"items"]); });
  return out; }
function locateLegacyQ(c,q){ const want=q.srcText; if(!want) return null;
  for(const bp of blockPaths(c)){ const txt=bp.text||"",idx=txt.indexOf(want); if(idx<0) continue;
    const toks=parseTokens(txt); let acc="",sti=null,eti=null;
    for(let ti=0;ti<toks.length;ti++){ acc+=serializeTokens([toks[ti]]); if(sti===null&&acc.length>idx) sti=ti; if(sti!==null&&acc.length>=idx+want.length){ eti=ti; break; } }
    if(sti!==null) return {blockId:bp.path.join("."),startTi:sti,endTi:eti!=null?eti:sti}; }
  return null; }
function qLoc(c,q){ if(q.type==="match") return null;
  if(q.blockId!=null&&q.startTi!=null) return {blockId:q.blockId,startTi:q.startTi,endTi:q.endTi!=null?q.endTi:q.startTi};
  return locateLegacyQ(c,q); }
function cmpBlockId(a,b){ if(a===b) return 0; const pa=a.split("."),pb=b.split(".");
  for(let i=0;i<Math.max(pa.length,pb.length);i++){ const x=pa[i],y=pb[i];
    if(x===undefined) return -1; if(y===undefined) return 1;
    const nx=+x,ny=+y,xn=!isNaN(nx),yn=!isNaN(ny);
    if(xn&&yn){ if(nx!==ny) return nx-ny; } else if(x!==y) return x<y?-1:1; }
  return 0; }
function cmpLoc(la,lb){ const ga=la?0:1,gb=lb?0:1; if(ga!==gb) return ga-gb; if(!la||!lb) return 0;
  const cb=cmpBlockId(la.blockId,lb.blockId); if(cb) return cb; return la.startTi-lb.startTi; }
function buildQLocMap(c){ const arr=(c.questions||[]).map(q=>({q,loc:qLoc(c,q)})),byBlock={};
  arr.forEach(e=>{ if(e.loc){ (byBlock[e.loc.blockId]=byBlock[e.loc.blockId]||[]).push(e); } });
  Object.keys(byBlock).forEach(k=>byBlock[k].sort((a,b)=>a.loc.startTi-b.loc.startTi));
  const ordered=arr.slice().sort((a,b)=>cmpLoc(a.loc,b.loc));
  return {byBlock,ordered}; }

/* 自动出题:选区(可跨段)→ 每个被选到的块,按句切分,凡含挖空的句子各成一道填空题(原挖空即要填的空) */
function getBlockByPath(c,path){ let cur=c.data.layers[path[0]]; for(let i=1;i<path.length;i++){ cur=(path[i]==="items")?cur.items:cur[path[i]]; if(cur==null) return null; } return cur; }
/* 按句切分:文本 token 按句末标点再切;挖空/提示作为整体不切。返回每句 {fillText,hasBlank,a,b(原 token 序,用于标识/排序)} */

  const ser=tk=>tk.__frag?tk.text:serializeTokens([tk]);
  const flush=()=>{ const ft=cur.map(ser).join(""); if(ft.trim()&&a!=null) out.push({fillText:ft,hasBlank,a,b}); cur=[]; hasBlank=false; a=null; b=null; };
  toks.forEach((tk,ti)=>{ if(tk.type==="blank"||tk.type==="hint"){ cur.push(tk); if(tk.type==="blank")hasBlank=true; if(a==null)a=ti; b=ti; return; }
    const pieces=tk.text.match(/[^。！？；!?;\n]*[。！？；!?;\n]|[^。！？；!?;\n]+/g)||[];
    pieces.forEach(p=>{ cur.push({__frag:true,text:p}); if(a==null)a=ti; b=ti; if(/[。！？；!?;\n]$/.test(p)) flush(); }); });
  flush(); return out; }
function buildFillQ(c,bid,a,b,fillText){ const srcPlain=parseTokens(fillText).map(tk=>tk.type==="blank"?tk.ans:tk.type==="hint"?"":tk.text).join("");
  const layerId=(c.data.layers[+(bid.split(".")[0])]||{}).id||0;
  return { id:uid(), layerId, blockId:bid, startTi:a, endTi:b, srcText:fillText, srcPlain, done:true, type:"fill", fillText, mcStem:"", mcAnswer:"", mcColor:"B", options:[], statement:srcPlain, truth:true, swap:null, tfAnswer:"", tfColor:"B" }; }
function autoGenFromSelection(){ const sel=window.getSelection(); if(!sel.rangeCount){ hideSelbar(); return; } const range=sel.getRangeAt(0);
  const c=db.contents.find(x=>x.id===_author.cid); if(!c) return;

function createQFromSel(){

/* 每题考试统计:出现/通过/连胜/曾错;曾错且连胜<5 视为「错题」,连胜≥5 视为已恢复=做对 */
function recordQuestionResult(q,pass){ q.seen=(q.seen||0)+1; if(pass){ q.passCount=(q.passCount||0)+1; q.streak=(q.streak||0)+1; } else { q.streak=0; q.wrongEver=true; } }

function qWeight(q){ const base={new:12,wrong:6,correct:2}[qClass(q)]; return base/(1+(q.seen||0)); }

    for(let i=0;i<pool.length;i++){ r-=qWeight(pool[i].q); if(r<=0){ idx=i; break; } } out.push(pool.splice(idx,1)[0]); }
  return out; }

async function finishReviewPlan(){

    const effKey=effectiveRatingKey(blended),memCp=rec.cps[0];

  const um=id?db.userModules.find(x=>x.id===id):{ id:"",name:"",code:tip,enabled:true };
  const body=openModal('<div class="d">'+(id?"编辑模块":"新增模块")+'</div>',
    '<div class="frow"><div class="field"><label>名称(标签页)</label><input type="text" id="emName" value="'+esc(um.name)+'"></div><div class="field"><label>id(同内置 id 可覆盖)</label><input type="text" id="emId" value="'+esc(um.id)+'" placeholder="如 stats / 或 home"></div></div><div class="field"><label>代码(JS 函数体)</label><textarea class="code" id="emCode">'+esc(um.code)+'</textarea></div><button class="btn" id="emSave">保存并启用</button>');
  body.querySelector("#emSave").onclick=async()=>{ const name=body.querySelector("#emName").value.trim(),mid=body.querySelector("#emId").value.trim()||("m"+uid().slice(0,5)),code=body.querySelector("#emCode").value;
    if(!name){ toast("请填名称"); return; } try{ new Function("container","api",code); }catch(err){ toast("代码有语法错误："+err.message); return; }
    if(id){ const u=db.userModules.find(x=>x.id===id); u.name=name; u.id=mid; u.code=code; } else db.userModules.push({ id:mid,name,code,enabled:true });
    await save(); closeModal(); render(); toast("已保存模块 ✓"); };
}

/* ===== 12. 导出 / 导入 + 初始化 ===== */
function openBackup(){
  const data=JSON.stringify(db,null,2);
  const fmtTs=t=>t?new Date(t).toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"未记录";
  const body=openModal('<div class="d">导出 / 导入数据</div>',
    '<div class="seclab">导出</div><div class="desc" style="margin-bottom:8px">本机数据最后修改：'+fmtTs(db.savedAt)+'</div><textarea readonly id="expArea" style="min-height:120px;font-family:ui-monospace,monospace;font-size:11px">'+esc(data)+'</textarea><div class="btnrow"><button class="btn sm" id="bkShare">分享 / 存到文件…</button><button class="btn sm" id="bkCopy">复制</button><button class="btn sm sec" id="bkDown">下载备份文件</button></div><div class="seclab">导入(覆盖全部)</div><textarea id="impArea" placeholder="粘贴之前导出的 JSON…" style="min-height:90px;font-family:ui-monospace,monospace;font-size:11px"></textarea><input type="file" id="impFile" accept="application/json,.json" style="margin-top:8px;font-size:12px"><div class="btnrow"><button class="btn sm warn" id="bkImport">导入并覆盖</button></div><div class="desc" id="bkStat"></div>');
  (function(){ const sb=body.querySelector("#bkShare"); let ok=false; /* iOS/安卓:直接调系统分享面板存进 OneDrive/文件 */
    try{ ok=!!(navigator.canShare&&navigator.canShare({files:[new File(["{}"],"t.json",{type:"application/json"})]})); }catch(e){}
    if(!ok){ sb.style.display="none"; return; }
    sb.onclick=async()=>{ const n=new Date(),fn="study-data-"+ymd(n).replace(/-/g,"")+"-"+pad(n.getHours())+pad(n.getMinutes())+".json";
      try{ await navigator.share({files:[new File([data],fn,{type:"application/json"})],title:"Study Hub 数据备份"}); markBackedUp(); toast("已分享 ✓"); }
      catch(e){ if(!e||e.name!=="AbortError") toast("分享失败,请用「下载备份文件」"); } }; })();
  body.querySelector("#bkCopy").onclick=async()=>{ try{ await navigator.clipboard.writeText(data); markBackedUp(); toast("已复制 ✓"); }catch(e){ const ta=body.querySelector("#expArea"); ta.select(); document.execCommand("copy"); markBackedUp(); toast("已复制 ✓"); } };
  body.querySelector("#bkDown").onclick=()=>{ const blob=new Blob([data],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a"); a.href=url; a.download="study-data-backup.json"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); markBackedUp(); toast("已下载"); };
  body.querySelector("#impFile").onchange=e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ body.querySelector("#impArea").value=rd.result; }; rd.readAsText(f); };
  body.querySelector("#bkImport").onclick=async()=>{ const raw=body.querySelector("#impArea").value.trim(),st=body.querySelector("#bkStat"); let o; try{ o=JSON.parse(raw); }catch(e){ st.textContent="解析失败：不是有效 JSON。"; return; }
    if(o.savedAt&&db.savedAt&&o.savedAt<db.savedAt&&!confirm("⚠ 要导入的数据("+fmtTs(o.savedAt)+")比本机("+fmtTs(db.savedAt)+")更旧!\n继续会用旧数据覆盖掉新进度。仍要导入吗?")) return;
    if(!confirm("导入会覆盖当前全部数据,确定?")) return; db=normalizeDb(o); await save(); closeModal(); state.view="home"; state.selDate=null; render(); toast("导入成功 ✓"); };
}
function markBackedUp(){ try{ localStorage.setItem("sh-last-backup",String(Date.now())); }catch(e){} }
function downloadBackup(){ const data=JSON.stringify(db,null,2); const blob=new Blob([data],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a"); a.href=url; a.download="study-data-backup.json"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); markBackedUp(); }
async function saveNow(){ const btn=document.getElementById("btnSaveNow"); if(btn){ btn.disabled=true; btn.textContent="保存中…"; }
  await save();
  if(fileHandle && !needReconnect){ toast("✅ 已保存到文件："+(fileHandle.name||"study-data.json")); }
  else if(fileHandle && needReconnect){ toast("⚠ 数据文件需重新授权，请在弹窗中允许…"); await reconnectFile(); if(fileHandle && !needReconnect){ await save(); toast("✅ 已恢复授权并保存到文件"); } else { downloadBackup(); toast("仍未授权，已为你下载一份备份文件"); } }
  else { downloadBackup(); toast("未绑定数据文件，已下载备份（建议到 设置→数据文件 绑定一次，之后自动写盘）"); }
  if(btn){ btn.disabled=false; btn.textContent="💾 立即保存"; } }
document.getElementById("mClose").onclick=closeModal;
document.getElementById("scrim").onclick=e=>{ if(e.target.id==="scrim") closeModal(); };
document.getElementById("reconnectBtn").onclick=reconnectFile;
const _bsn=document.getElementById("btnSaveNow"); if(_bsn) _bsn.onclick=saveNow;
window.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeModal(); hideSelbar(); } });
document.addEventListener("mousedown",e=>{ if(!e.target.closest("#selbar")&&!e.target.closest(".selwrap")) hideSelbar(); });
window.addEventListener("scroll",hideSelbar,true);
window.addEventListener("focus",maybeAutoRefresh);
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) maybeAutoRefresh(); });
setInterval(()=>{ if(state.view==="home" && !document.getElementById("scrim").classList.contains("on")) render(); },60000);
(async function init(){ csLoadCfg(); await load(); render(); updateFs(); await autoImportOnBoot(); csSync({}); })();

/* ===== 13. PWA:离线缓存 + 备份提醒 ===== */
if("serviceWorker" in navigator && (location.protocol==="https:"||["localhost","127.0.0.1"].includes(location.hostname))){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
(function backupReminder(){ /* 没有任何自动同步的环境(如 iPhone 且未配云同步):提醒定期导出备份 */
  if(fsSupported()||csConfigured()||!hasLS()) return;
  try{ const last=+localStorage.getItem("sh-last-backup")||0;
    if(!last){ localStorage.setItem("sh-last-backup",String(Date.now())); return; }
    const days=Math.floor((Date.now()-last)/86400000);
    if(days>=7) setTimeout(()=>toast("📤 已 "+days+" 天未备份,建议到 设置 → 导出/导入 分享一份到 OneDrive",6000),1600);
  }catch(e){}
})();
</script>
